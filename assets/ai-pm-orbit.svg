<svg width="520" height="360" viewBox="0 0 520 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Animated AI product manager orbit dashboard">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="520" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1020"/>
      <stop offset="0.48" stop-color="#171A3A"/>
      <stop offset="1" stop-color="#0E7490"/>
    </linearGradient>
    <linearGradient id="neon" x1="92" y1="36" x2="455" y2="304" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE"/>
      <stop offset="0.52" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#F472B6"/>
    </linearGradient>
    <linearGradient id="line" x1="84" y1="174" x2="428" y2="174" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE" stop-opacity="0"/>
      <stop offset="0.45" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#F472B6" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="26" height="26" patternUnits="userSpaceOnUse">
      <path d="M26 0H0V26" stroke="#E0F2FE" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="520" height="360" rx="28" fill="url(#bg)"/>
  <rect x="1" y="1" width="518" height="358" rx="27" stroke="url(#neon)" stroke-opacity="0.7"/>
  <rect width="520" height="360" rx="28" fill="url(#grid)"/>

  <g opacity="0.78">
    <circle cx="260" cy="180" r="112" stroke="url(#neon)" stroke-width="1.2" stroke-dasharray="7 10"/>
    <circle cx="260" cy="180" r="78" stroke="#A78BFA" stroke-opacity="0.35"/>
    <ellipse cx="260" cy="180" rx="154" ry="56" stroke="#22D3EE" stroke-opacity="0.32"/>
    <ellipse cx="260" cy="180" rx="154" ry="56" stroke="#F472B6" stroke-opacity="0.25" transform="rotate(60 260 180)"/>
  </g>

  <g transform="translate(260 180)" filter="url(#glow)">
    <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="11s" repeatCount="indefinite" additive="sum"/>
    <circle cx="112" cy="0" r="9" fill="#22D3EE"/>
    <circle cx="-78" cy="0" r="7" fill="#F472B6"/>
    <circle cx="0" cy="-112" r="6" fill="#A78BFA"/>
  </g>

  <g filter="url(#glow)">
    <rect x="188" y="108" width="144" height="144" rx="28" fill="#0F172A" fill-opacity="0.84" stroke="url(#neon)"/>
    <path d="M235 173c0-15 11-27 25-27s25 12 25 27-11 27-25 27-25-12-25-27Z" stroke="#E0F2FE" stroke-width="4"/>
    <path d="M226 218c11-15 22-22 34-22s23 7 34 22" stroke="#22D3EE" stroke-width="4" stroke-linecap="round"/>
    <path d="M260 126v18M260 202v24M214 180h20M286 180h20" stroke="#A78BFA" stroke-width="4" stroke-linecap="round"/>
    <circle cx="260" cy="180" r="3.8" fill="#F472B6">
      <animate attributeName="r" values="3.8;7;3.8" dur="1.7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;.45;1" dur="1.7s" repeatCount="indefinite"/>
    </circle>
  </g>

  <path d="M84 174H168" stroke="url(#line)" stroke-width="3" stroke-linecap="round"/>
  <path d="M352 174H436" stroke="url(#line)" stroke-width="3" stroke-linecap="round"/>
  <path d="M260 54V86" stroke="#22D3EE" stroke-opacity="0.7" stroke-width="3" stroke-linecap="round"/>
  <path d="M260 274V306" stroke="#F472B6" stroke-opacity="0.7" stroke-width="3" stroke-linecap="round"/>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" fill="#E0F2FE">
    <g opacity="0.96">
      <rect x="42" y="48" width="126" height="48" rx="14" fill="#020617" fill-opacity="0.55" stroke="#22D3EE" stroke-opacity="0.45"/>
      <text x="58" y="78">Insight → PRD</text>
    </g>
    <g opacity="0.96">
      <rect x="350" y="48" width="128" height="48" rx="14" fill="#020617" fill-opacity="0.55" stroke="#A78BFA" stroke-opacity="0.45"/>
      <text x="366" y="78">Agent System</text>
    </g>
    <g opacity="0.96">
      <rect x="36" y="266" width="152" height="48" rx="14" fill="#020617" fill-opacity="0.55" stroke="#F472B6" stroke-opacity="0.45"/>
      <text x="52" y="296">Robot Scenario</text>
    </g>
    <g opacity="0.96">
      <rect x="344" y="266" width="138" height="48" rx="14" fill="#020617" fill-opacity="0.55" stroke="#22D3EE" stroke-opacity="0.45"/>
      <text x="360" y="296">Data Iteration</text>
    </g>
  </g>

  <g font-family="SFMono-Regular, Consolas, Menlo, monospace" fill="#BAE6FD" font-size="13" opacity="0.85">
    <text x="34" y="340">AIPM AmoryZ · AI Product Manager</text>
    <text x="336" y="340">building with AI</text>
  </g>
</svg>
